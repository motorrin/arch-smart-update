# =========================================================================
# Arch Smart Update - Main Configuration File
#
# NOTE: If you are reading this in the '.default.conf' file, DO NOT edit it,
# as it will be overwritten by updates. Edit 'settings.conf' instead.
# =========================================================================

# --- 1. General Settings ---
# Set to true to always ask if you want to refresh mirrors before syncing databases.
PROMPT_MIRROR_REFRESH=true

# Number of Pacman DB backups to keep in /var/lib/pacman/backup/
MAX_BACKUP_COPIES=5

# Override the default AUR helper (e.g. "yay", "pikaur"). Leave empty to auto-detect.
AUR_HELPER_OVERRIDE=""

# Automatically run system cleanup after a successful update (orphans, package cache, journals).
ENABLE_POST_CLEANUP=false

# --- 2. Update Delays (Hours) ---
# Minimum age for ANY package (allows mirrors to fully sync).
T_MIRROR_H=3

# Delay for FEATURE packages (e.g., pipewire, networkmanager).
T_FEAT_H=6

# Delay for CRITICAL packages (e.g., base, mesa, xorg, wayland).
T_CRIT_H=12

# Delay for Desktop Environments (e.g., Plasma, Gnome, Hyprland).
T_DE_H=12

# Delay for NUCLEAR / Core system packages (e.g., linux, glibc, systemd).
T_NUKE_H=24

# If true, minor "Patch" updates ignore category timers and use only T_MIRROR_H.
IGNORE_PATCH_TIMERS=true

# --- 3. Background Checker Settings ---
ENABLE_BACKGROUND_CHECK=false
CHECK_INTERVAL=40min
START_DELAY=5min

# --- 4. Logging ---
GENERATE_LOGS=false
MAX_LOG_NUMBERS=5

# --- 5. Custom Reflector Command ---
# Uncomment and edit to override the default reflector behavior.
# CUSTOM_REFLECTOR_CMD="sudo reflector --country Germany,Netherlands,France,Norway --protocol https --age 12 --latest 50 --number 20 --sort rate --save /etc/pacman.d/mirrorlist --download-timeout 10"

# --- 6. Custom Update Commands ---
# Extra commands to run during the update.
# If you include pacman, yay, or paru here, the default system update will be DISABLED.
CUSTOM_CMDS=(
    # "flatpak update -y"
    # "paru -Syu"
)

# --- 7. User Packages ---
# Add your own packages to the existing update categories here.
USER_NUCLEAR_PKGS=(
    # "my-custom-kernel"
)

USER_CRITICAL_PKGS=(
    # "my-critical-app"
)

USER_FEATURE_PKGS=(
    # "my-feature-app"
)
